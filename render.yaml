services:
  - type: web
    name: ferocity-ai-business-operator
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start:render
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 24.14.1
      - key: ADMIN_ACCESS_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
